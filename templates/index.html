<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Negotiator | Premium Chat Interface</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        #chatBox::-webkit-scrollbar {
            width: 6px;
        }

        #chatBox::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            position: relative;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .ai-message b {
            color: #a5b4fc;
            display: block;
            margin-bottom: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer {
            padding: 24px 32px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 16px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #inputBox {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px 20px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        #inputBox:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        #sendBtn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sendBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        #sendBtn:active {
            transform: translateY(1px);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 18px;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 640px) {
            .container { height: 100vh; margin: 0; border-radius: 0; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="status-dot"></div>
        <h1>AI Negotiator</h1>
    </header>

    <div id="chatBox">
        <div class="message ai-message">
            <b>System</b>
            Welcome to the Negotiation Suite. I am your specialized AI negotiator. How can I assist you with your deal today?
        </div>
    </div>

    <div id="typingIndicator" class="typing-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="footer">
        <div class="input-wrapper">
            <input id="inputBox" type="text" placeholder="Discuss your terms..." autocomplete="off" />
        </div>
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const inputBox = document.getElementById("inputBox");
    const sendBtn = document.getElementById("sendBtn");
    const typingIndicator = document.getElementById("typingIndicator");

    const appendMessage = (role, text) => {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}-message`;
        
        if (role === 'ai') {
            msgDiv.innerHTML = `<b>AI Negotiator</b>${text}`;
        } else {
            msgDiv.innerText = text;
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    const sendMessage = async () => {
        const message = inputBox.value.trim();
        if (!message) return;

        inputBox.value = "";
        appendMessage("user", message);
        
        // Show typing indicator
        typingIndicator.style.display = "flex";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            
            // Hide typing indicator
            typingIndicator.style.display = "none";

            if (data.reply) {
                appendMessage("ai", data.reply);
            } else {
                appendMessage("ai", "Error: " + (data.error || "Failed to get response"));
            }
        } catch (error) {
            typingIndicator.style.display = "none";
            appendMessage("ai", "Error: Connection failed.");
        }
    };

    sendBtn.onclick = sendMessage;

    // Enter key support
    inputBox.onkeydown = (e) => {
        if (e.key === "Enter") {
            sendMessage();
        }
    };

    // Auto-focus input
    inputBox.focus();
</script>

</body>
</html>
